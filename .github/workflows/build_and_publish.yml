name: Build and Publish Mod

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Loom Caches
        uses: actions/cache@v4
        with:
          path: .gradle/loom-cache
          key: ${{ runner.os }}-loom-${{ hashFiles('gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-loom-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Determine Version
        id: determine_version
        shell: bash
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]" 2>/dev/null || echo "v1.0.0")
          BASE_VERSION="${LATEST_TAG#v}"
          
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAG_NAME="${{ github.ref_name }}"
            SHOULD_PUBLISH="true"
            SHOULD_PUBLISH_MODRINTH="true"
            echo "Publishing release version: $VERSION from tag"
          elif [[ "${{ github.ref }}" == refs/heads/main && "${{ github.event_name }}" == "push" ]]; then
            VERSION="${BASE_VERSION}-beta.${{ github.run_number }}"
            TAG_NAME="v${VERSION}"
            SHOULD_PUBLISH="true"
            SHOULD_PUBLISH_MODRINTH="false"
            echo "Publishing build version: $VERSION from main push (GitHub only)"
          else
            VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
            TAG_NAME=""
            SHOULD_PUBLISH="false"
            SHOULD_PUBLISH_MODRINTH="false"
            echo "Building dev version: $VERSION (no publishing)"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "should_publish=${SHOULD_PUBLISH}" >> $GITHUB_OUTPUT
          echo "should_publish_modrinth=${SHOULD_PUBLISH_MODRINTH}" >> $GITHUB_OUTPUT

      - name: Build Mod with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -Pmod_version="${{ steps.determine_version.outputs.version }}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: avo-utils-mod
          path: |
            build/libs/avoutils-*.jar
            !build/libs/avoutils-*-sources.jar
            !build/libs/avoutils-*-dev.jar

      - name: Create GitHub Release
        if: steps.determine_version.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.determine_version.outputs.tag_name }}
          files: |
            build/libs/avoutils-*.jar
            !build/libs/avoutils-*-sources.jar
            !build/libs/avoutils-*-dev.jar
          draft: false
          prerelease: ${{ contains(steps.determine_version.outputs.version, '-') }}
          generate_release_notes: true

      - name: Resolve Modrinth Metadata
        if: steps.determine_version.outputs.should_publish_modrinth == 'true'
        id: modrinth_meta
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t release_jars < <(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' | sort)
          if [[ "${#release_jars[@]}" -ne 1 ]]; then
            echo "Expected exactly one release jar, found ${#release_jars[@]}" >&2
            printf 'Found jars:\n%s\n' "${release_jars[@]}" >&2
            exit 1
          fi

          minecraft_version="$(sed -n 's/^minecraft_version=//p' gradle.properties)"

          changelog="$(git tag -l --format='%(contents)' "${{ steps.determine_version.outputs.tag_name }}")"
          if [[ -z "$changelog" || "$changelog" == "${{ steps.determine_version.outputs.tag_name }}" ]]; then
            changelog="See https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ steps.determine_version.outputs.tag_name }}"
          fi

          {
            echo "mod_jar=${release_jars[0]}"
            echo "minecraft_version=${minecraft_version}"
            echo "changelog<<EOF"
            echo "${changelog}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        if: steps.determine_version.outputs.should_publish_modrinth == 'true'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          payload="$(jq -cn \
            --arg name "AvoUtils ${{ steps.determine_version.outputs.version }}" \
            --arg version_number "${{ steps.determine_version.outputs.version }}" \
            --arg changelog "${{ steps.modrinth_meta.outputs.changelog }}" \
            --arg project_id "${MODRINTH_PROJECT_ID}" \
            --arg minecraft_version "${{ steps.modrinth_meta.outputs.minecraft_version }}" \
            '{
              name: $name,
              version_number: $version_number,
              changelog: $changelog,
              project_id: $project_id,
              game_versions: [$minecraft_version],
              version_type: "release",
              dependencies: [],
              loaders: ["fabric"],
              featured: true,
              status: "listed",
              file_parts: ["primary"],
              primary_file: "primary"
            }'
          )"

          curl --fail-with-body --show-error --silent \
            -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "User-Agent: AviciaGuild/AvoUtils-release-workflow" \
            --form-string "data=${payload}" \
            -F "primary=@${{ steps.modrinth_meta.outputs.mod_jar }}"

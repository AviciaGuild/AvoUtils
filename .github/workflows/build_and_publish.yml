name: Build and Publish Mod

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Determine Version
        id: determine_version
        shell: bash
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          BASE_VERSION="${LATEST_TAG#v}"
          
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAG_NAME="${{ github.ref_name }}"
            SHOULD_PUBLISH="true"
            echo "Publishing release version: $VERSION from tag"
          elif [[ "${{ github.ref }}" == refs/heads/main && "${{ github.event_name }}" == "push" ]]; then
            VERSION="${BASE_VERSION}-build.${{ github.run_number }}"
            TAG_NAME="v${VERSION}"
            SHOULD_PUBLISH="true"
            echo "Publishing build version: $VERSION from main push"
          else
            VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
            TAG_NAME=""
            SHOULD_PUBLISH="false"
            echo "Building dev version: $VERSION (no publishing)"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "should_publish=${SHOULD_PUBLISH}" >> $GITHUB_OUTPUT

      - name: Build Mod with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -Pmod_version="${{ steps.determine_version.outputs.version }}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: avo-utils-mod
          path: |
            build/libs/avoutils-*.jar
            !build/libs/avoutils-*-sources.jar
            !build/libs/avoutils-*-dev.jar

      - name: Create GitHub Release
        if: steps.determine_version.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.determine_version.outputs.tag_name }}
          files: |
            build/libs/avoutils-*.jar
            !build/libs/avoutils-*-sources.jar
            !build/libs/avoutils-*-dev.jar
          draft: false
          prerelease: ${{ contains(steps.determine_version.outputs.version, '-') }}
          generate_release_notes: true

